<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taakanalyse CompetentNL Skills</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4f0;--surface:#f8fdf8;--border:#c8d8c8;--border-s:#8aaa8a;--text:#141f14;--muted:#5a705a;--accent:#2d6a4f;--accent2:#1b4332}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono','Courier New',monospace;font-size:13px}
.header{border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;background:var(--surface)}
.header-logo{height:34px;object-fit:contain}
.header-titles{flex:1}
.eyebrow{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.site-title{font-family:'Instrument Serif',Georgia,serif;font-size:22px;line-height:1;font-style:italic}
.site-title span{font-style:normal}
.cnl-badge{display:inline-flex;align-items:center;gap:5px;background:#e8f5e9;color:#1b4332;border:1px solid #a5d6a7;padding:2px 8px;border-radius:2px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-left:10px;font-family:'Geist Mono',monospace}
.main{display:flex;min-height:calc(100vh - 74px)}
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);padding:18px 14px;background:var(--surface);display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.slabel{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
input.field{font-family:'Geist Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--border);color:var(--text);outline:none;padding:7px 10px;border-radius:2px;width:100%;transition:border-color .2s}
input.field:focus{border-color:var(--border-s)}
textarea{font-family:'Geist Mono',monospace;font-size:11px;line-height:1.6;background:var(--bg);border:1px solid var(--border);color:var(--text);resize:none;outline:none;padding:9px 11px;border-radius:2px;width:100%;transition:border-color .2s}
textarea:focus{border-color:var(--border-s)}
textarea::placeholder{color:var(--border-s)}
.btn-main{width:100%;padding:10px;background:var(--accent2);color:#f8fdf8;border:none;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
.btn-main:hover:not(:disabled){opacity:.82}
.btn-main:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px;cursor:pointer;border-radius:2px;width:100%;transition:all .15s}
.btn-ghost:hover{border-color:var(--border-s);color:var(--text)}
.spin{width:12px;height:12px;border:1.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{border:1px solid #e07070;background:#fce4e4;color:#9b2226;padding:9px 11px;font-size:10px;line-height:1.5;border-radius:2px;word-break:break-word}
.legend{border-top:1px solid var(--border);padding-top:12px;margin-top:auto}
.li{display:flex;align-items:flex-start;gap:7px;font-size:10px;margin-bottom:6px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-g{font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;color:var(--border);line-height:1}
.empty-t{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.6}
.ls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ls-t{font-family:'Instrument Serif',serif;font-style:italic;font-size:17px;color:var(--muted)}
.lb{width:140px;height:1px;background:var(--border);position:relative;overflow:hidden}
.lb::after{content:'';position:absolute;left:-60%;width:60%;height:100%;background:var(--accent);animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{left:-60%}100%{left:160%}}
.rh{border-bottom:1px solid var(--border);padding:16px 22px;background:var(--surface)}
.rt{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;margin-bottom:2px}
.rs{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.rm{display:flex;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap;align-items:center}
.rm strong{color:var(--text)}
.rv{font-size:9px;color:var(--muted);margin-top:3px}
.steps{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.step-btn{flex:1;padding:12px 8px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;transition:all .15s;text-align:center}
.step-btn:hover{color:var(--text)}
.step-btn.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.step-btn.done{color:var(--accent)}
.tc{flex:1;overflow-y:auto;padding:18px 22px}
.taak-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:2px;margin-bottom:5px;background:var(--surface);cursor:pointer;transition:all .15s}
.taak-row:hover{border-color:var(--border-s)}
.taak-row.selected{border-color:var(--accent);background:#f0faf4}
.taak-check{width:16px;height:16px;border-radius:2px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.taak-row.selected .taak-check{background:var(--accent);border-color:var(--accent)}
.taak-body{flex:1;min-width:0}
.taak-naam{font-size:12px;line-height:1.4;margin-bottom:4px}
.taak-meta{display:flex;gap:5px;flex-wrap:wrap}
.tbadge{font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid}
.tk{border:1px solid var(--border);background:var(--surface);border-radius:2px;margin-bottom:6px;overflow:hidden}
.tk.open{border-color:var(--accent2)}
.tkh{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;cursor:pointer;user-select:none}
.tnum{font-size:9px;color:var(--muted);flex-shrink:0;width:18px;margin-top:1px}
.tbody{flex:1;min-width:0}
.tname{font-size:12px;line-height:1.4;margin-bottom:4px}
.tchev{font-size:8px;color:var(--muted);flex-shrink:0;margin-top:2px}
.tex{border-top:1px solid var(--border);padding:11px 12px 13px 41px;background:var(--bg);display:flex;flex-direction:column;gap:11px}
.secl{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:2px;font-size:10px;border:1px solid}
.pd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cnl-skill-badge{background:#e8f5e9;color:#1b4332;border:1px solid #a5d6a7;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px;font-weight:500}
.eigen-badge{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px}
.no-match{background:#f5f5f5;color:#999;border:1px solid #ddd;padding:1px 5px;border-radius:2px;font-size:8px;margin-left:3px}
.sk-card{border:1px solid var(--border);background:var(--surface);border-radius:2px;padding:9px 11px;display:flex;flex-direction:column;gap:6px}
.sk-top{display:flex;align-items:center;gap:6px}
.sk-name{font-size:11px;flex:1}
.sk-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:2px;font-size:10px;border:1px solid;flex-shrink:0}
.sl-wrap{display:flex;flex-direction:column;gap:2px}
.sl-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;outline:none;cursor:pointer;background:var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent2);cursor:pointer;border:2px solid var(--surface)}
.def-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:2px;margin-bottom:5px;background:var(--surface);cursor:pointer}
.def-row.selected{border-color:var(--accent2);background:var(--bg)}
.def-check{width:15px;height:15px;border-radius:2px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.def-row.selected .def-check{background:var(--accent2);border-color:var(--accent2)}
.fi{animation:fi .3s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.toggle-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:1px solid var(--border);color:var(--text);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 10px;cursor:pointer;border-radius:2px;transition:all .15s}
.toggle-btn.open{border-color:#c084fc;color:#6b21a8;background:#fdf9ff;border-radius:2px 2px 0 0}
.eigen-panel{border:1px solid #c084fc;border-top:none;padding:10px;background:#fdf9ff;display:flex;flex-direction:column;gap:8px;border-radius:0 0 2px 2px}
.eigen-sm{background:#f3e8ff;color:#6b21a8;border:1px solid #c084fc;padding:1px 5px;border-radius:2px;font-size:9px}
.counter-box{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.counter{padding:5px 12px;border:1px solid var(--border);border-radius:2px;font-size:11px;background:var(--bg)}
.export-btns{display:flex;gap:8px;margin-left:auto}
.btn-export{padding:5px 14px;color:white;border:none;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.btn-export:hover:not(:disabled){opacity:.85}
.btn-export:disabled{opacity:.4;cursor:not-allowed}
.btn-excel{background:var(--accent)}
.btn-word{background:var(--accent2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

async function generateWordDoc({ functietitel, bedrijf, samenvatting, vergelijkbareTitels, geselecteerdeTaken, skillsData, selHard, selSoft, overrides, eigenTermenLijst, uitgebreid, bronnen, pdfNaam, input }) {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, HeadingLevel, BorderStyle, WidthType, ShadingType, Footer, Header } = docx;
  const datum = new Date().toLocaleDateString('nl-NL', {day:'numeric',month:'long',year:'numeric'});
  const BRAND = "1B4332"; const ACCENT = "2D6A4F"; const LIGHT = "D8F3DC"; const MC = "A5D6A7";
  const border = {style:BorderStyle.SINGLE,size:1,color:MC};
  const borders = {top:border,bottom:border,left:border,right:border};

  let uitgebreideOmschrijving = '';
  if (uitgebreid) {
    try {
      const bronLijst = bronnen ? (Array.isArray(bronnen) ? bronnen.join(', ') : bronnen.split('\n').filter(b=>b.trim()).join(', ')) : '';
      const res = await fetch('/api/analyse-competentnl', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ stap:3, functietitel, functieprofiel:input, samenvatting, taken:geselecteerdeTaken, skills:{hard:selHard,soft:selSoft}, bedrijf, bronnen:bronLijst }) });
      const data = await res.json();
      if (data.omschrijving) uitgebreideOmschrijving = data.omschrijving;
    } catch(e) { console.error('Omschrijving fout:', e); }
  }

  const h1 = (text) => new Paragraph({heading:HeadingLevel.HEADING_1,spacing:{before:360,after:160},border:{bottom:{style:BorderStyle.SINGLE,size:8,color:ACCENT,space:4}},children:[new TextRun({text,font:"Arial",size:28,bold:true,color:BRAND})]});
  const p = (text,opts={}) => new Paragraph({spacing:{before:60,after:100},children:[new TextRun({text,font:"Arial",size:20,...opts})]});
  const sp = (pt=120) => new Paragraph({spacing:{before:pt,after:0},children:[new TextRun("")]});

  const getNiveau = (tid,skill,orig) => overrides[tid+'-'+skill]||orig;
  const skillsPerTaak = new Map();
  if (skillsData) (skillsData.taken||[]).forEach(t=>skillsPerTaak.set(t.id,t));
  const selHardNames = new Set(selHard.map(s=>s.skill));
  const selSoftNames = new Set(selSoft.map(s=>s.softskill));

  const mkHeader = (cells,widths,fill) => new TableRow({tableHeader:true,children:cells.map((c,i)=>new TableCell({borders,width:{size:widths[i],type:WidthType.DXA},shading:{fill,type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:140,right:100},children:[new Paragraph({children:[new TextRun({text:c,font:"Arial",size:17,bold:true,color:"FFFFFF"})]})]}))});

  // Skill-centric: één rij per skill, alle gekoppelde taken erin — zelfde als Lightcast
  const skillMap = new Map();
  geselecteerdeTaken.forEach(taak => {
    const st = skillsPerTaak.get(taak.id);
    const hs = st?(st.hardskills||[]).filter(s=>selHardNames.has(s.skill)):[];
    const ss = st?(st.softskills||[]).filter(s=>selSoftNames.has(s.softskill)):[];
    hs.forEach(s => {
      const key = 'h-'+s.skill;
      const niveau = getNiveau(taak.id, s.skill, s.niveau);
      if (!skillMap.has(key)) skillMap.set(key, {type:'Hard', naam:s.cnl_label||s.skill, niveau, definitie:s.cnl_definitie||'', taken:[]});
      skillMap.get(key).taken.push(taak.taak);
    });
    ss.forEach(s => {
      const key = 'c-'+s.softskill;
      const niveau = getNiveau(taak.id, 'c-'+s.softskill, s.niveau||'Gevorderd');
      if (!skillMap.has(key)) skillMap.set(key, {type:'Soft', naam:s.cnl_label||s.softskill, niveau, definitie:s.cnl_definitie||'', taken:[]});
      skillMap.get(key).taken.push(taak.taak);
    });
  });

  // Kolombreedte: Type(600) | Skill NL(2500) | Niveau(1200) | Gekoppelde taken(3226) | CNL Definitie(1500) = 9026
  const COL = [600,2500,1200,3226,1500];
  const skillRows = [...skillMap.values()].map(s => {
    const takenTekst = s.taken.map((t,i)=>(i+1)+'. '+t).join('\n');
    const takenParagraphs = s.taken.map((t,i) => new Paragraph({spacing:{before:40,after:40},children:[new TextRun({text:(i+1)+'. '+t,font:"Arial",size:15})]}));
    return new TableRow({children:[
      new TableCell({borders,width:{size:COL[0],type:WidthType.DXA},shading:{fill:s.type==='Hard'?"E8F5E9":"FEF9E7",type:ShadingType.CLEAR},margins:{top:60,bottom:60,left:80,right:80},children:[new Paragraph({children:[new TextRun({text:s.type,font:"Arial",size:16,bold:true,color:s.type==='Hard'?"1B4332":"7D6608"})]})] }),
      new TableCell({borders,width:{size:COL[1],type:WidthType.DXA},margins:{top:60,bottom:60,left:140,right:100},children:[new Paragraph({children:[new TextRun({text:s.naam,font:"Arial",size:17,bold:true})]})] }),
      new TableCell({borders,width:{size:COL[2],type:WidthType.DXA},margins:{top:60,bottom:60,left:80,right:80},children:[new Paragraph({children:[new TextRun({text:s.niveau,font:"Arial",size:16})]})] }),
      new TableCell({borders,width:{size:COL[3],type:WidthType.DXA},margins:{top:60,bottom:60,left:100,right:80},children:takenParagraphs }),
      new TableCell({borders,width:{size:COL[4],type:WidthType.DXA},margins:{top:60,bottom:60,left:100,right:80},children:[new Paragraph({children:[new TextRun({text:s.definitie.slice(0,300),font:"Arial",size:15,color:"444444"})]})] }),
    ]});
  });

  const doc = new Document({
    styles:{default:{document:{run:{font:"Arial",size:20}}}},
    sections:[{
      properties:{page:{size:{width:11906,height:16838},margin:{top:1134,right:1134,bottom:1134,left:1134}}},
      headers:{default:new Header({children:[new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:6,color:ACCENT,space:4}},children:[new TextRun({text:"TAAKANALYSE  |  ",font:"Arial",size:16,bold:true,color:ACCENT}),new TextRun({text:functietitel+(bedrijf?" \u2014 "+bedrijf:""),font:"Arial",size:16,color:"666666"}),new TextRun({text:"\tBright Work Solutions",font:"Arial",size:16,color:"999999"})],tabStops:[{type:"right",position:9026}]})]})},
      footers:{default:new Footer({children:[new Paragraph({border:{top:{style:BorderStyle.SINGLE,size:4,color:MC,space:4}},children:[new TextRun({text:"CompetentNL \u2014 Gegenereerd op "+datum,font:"Arial",size:16,color:"999999"}),new TextRun({text:"\tBright Work Solutions",font:"Arial",size:16,color:"999999"})],tabStops:[{type:"right",position:9026}]})]})},
      children:[
        new Paragraph({spacing:{before:480,after:80},children:[new TextRun({text:"Taakanalyse",font:"Arial",size:52,bold:true,color:BRAND})]}),
        new Paragraph({spacing:{before:0,after:80},children:[new TextRun({text:functietitel,font:"Arial",size:40,bold:true,color:ACCENT})]}),
        new Paragraph({spacing:{before:0,after:40},children:[new TextRun({text:bedrijf||"",font:"Arial",size:24,color:"555555"})]}),
        new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:12,color:ACCENT,space:8}},spacing:{before:80,after:280},children:[new TextRun({text:"Skills-based taakanalyse op basis van CompetentNL \u2014 Nederlandse Nationale Standaard",font:"Arial",size:18,color:"888888",italics:true})]}),
        new Table({width:{size:9026,type:WidthType.DXA},columnWidths:[2400,6626],rows:[
          ...[
            ["Bedrijf",bedrijf||"\u2014"],
            ["Functietitel",functietitel],
            ["Datum",datum],
            ["Skills-taxonomie","CompetentNL v1 \u2014 Nationale standaard NL"],
            ["Taken",String(geselecteerdeTaken.length)],
            ["Hardskills",String(selHard.length)],
            ["Softskills",String(selSoft.length)],
            ["Geselecteerde skills",String(selHard.length+selSoft.length)+" ("+String(selHard.length)+" hard, "+String(selSoft.length)+" soft)"],
            ...(vergelijkbareTitels.length?[["Ook bekend als",vergelijkbareTitels.join(", ")]]:[])
          ].map(([k,v])=>new TableRow({children:[
            new TableCell({borders,width:{size:2400,type:WidthType.DXA},shading:{fill:LIGHT,type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:140,right:100},children:[new Paragraph({children:[new TextRun({text:k,font:"Arial",size:18,bold:true,color:BRAND})]})]}),
            new TableCell({borders,width:{size:6626,type:WidthType.DXA},margins:{top:80,bottom:80,left:140,right:80},children:[new Paragraph({children:[new TextRun({text:v,font:"Arial",size:18})]})]})
          ]}))
        ]}),
        sp(320),
        h1("1. Functieoverzicht"),
        p(samenvatting||""),
        ...(vergelijkbareTitels.length?[p("Ook bekend als: "+vergelijkbareTitels.join(" \u00b7 "),{color:"666666",italics:true})]:[]),
        ...(uitgebreideOmschrijving ? uitgebreideOmschrijving.split('\n\n').filter(Boolean).map(a=>p(a)) : []),
        sp(160),
        h1("2. Skillset per taak"),
        p("Alle skills zijn afkomstig uit de CompetentNL-database, de Nederlandse nationale standaard voor het beschrijven van vaardigheden en competenties."),
        sp(120),
        new Table({
          width:{size:9026,type:WidthType.DXA},
          columnWidths:COL,
          rows:[
            mkHeader(["Type","Skill (NL)","Niveau","Gekoppelde taken","CNL Definitie"],COL,BRAND),
            ...skillRows
          ]
        }),
        sp(280),
        h1("3. Bronnen"),
        new Table({width:{size:9026,type:WidthType.DXA},columnWidths:[2200,2400,4426],rows:[
          mkHeader(["Bron","URL","Omschrijving"],[2200,2400,4426],BRAND),
          ...[
            ["CompetentNL","https://competentnl.nl","Nederlandse nationale standaard voor het beschrijven van skills"],
            ["ESCO (EU)","https://esco.ec.europa.eu","Europese classificatie van beroepen en vaardigheden"],
            ["Anthropic Claude","https://www.anthropic.com","AI-model voor taakanalyse en skillskoppeling (claude-sonnet-4-6)"]
          ].map(([naam,url,omschr])=>new TableRow({children:[
            new TableCell({borders,width:{size:2200,type:WidthType.DXA},margins:{top:70,bottom:70,left:140,right:100},children:[new Paragraph({children:[new TextRun({text:naam,font:"Arial",size:17,bold:true})]})] }),
            new TableCell({borders,width:{size:2400,type:WidthType.DXA},margins:{top:70,bottom:70,left:100,right:100},children:[new Paragraph({children:[new TextRun({text:url,font:"Arial",size:15,color:"1A56DB"})]})] }),
            new TableCell({borders,width:{size:4426,type:WidthType.DXA},margins:{top:70,bottom:70,left:100,right:80},children:[new Paragraph({children:[new TextRun({text:omschr,font:"Arial",size:15,color:"444444"})]})] })
          ]}))
        ]}),
        sp(120),
        p("Analyse gegenereerd op "+datum+".",{italics:true,color:"888888"}),
      ]
    }]
  });

  return await Packer.toBlob(doc);
}

const NIVEAUS = ["Basis","Gevorderd","Expert"];
const NIVEAU = {
  Basis:    {k:"#d8f3dc",t:"#2d6a4f",b:"#74c69d",d:"#2d6a4f",desc:"Uitvoerend, onder begeleiding"},
  Gevorderd:{k:"#fef3d0",t:"#7a5c00",b:"#e8c96a",d:"#c4860a",desc:"Zelfstandig, complexe situaties"},
  Expert:   {k:"#fce4e4",t:"#9b2226",b:"#e07070",d:"#9b2226",desc:"Strategisch, begeleidt anderen"},
};

function App() {
  const [bedrijf, setBedrijf] = useState("");
  const [eigenTaal, setEigenTaal] = useState("");
  const [eigenOpen, setEigenOpen] = useState(false);
  const [bronnen, setBronnen] = useState("");
  const [bronnenOpen, setBronnenOpen] = useState(false);
  const [pdfTekst, setPdfTekst] = useState("");
  const [pdfNaam, setPdfNaam] = useState("");
  const [input, setInput] = useState("");
  const [stap, setStap] = useState(0);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [error, setError] = useState(null);
  const [functietitel, setFunctietitel] = useState("");
  const [samenvatting, setSamenvatting] = useState("");
  const [vergelijkbareTitels, setVergelijkbareTitels] = useState([]);
  const [taken, setTaken] = useState([]);
  const [skillsData, setSkillsData] = useState(null);
  const [overrides, setOverrides] = useState({});
  const [openTask, setOpenTask] = useState(null);
  const [selectedDef, setSelectedDef] = useState({});
  const [wordLoading, setWordLoading] = useState(false);
  const [eigenTaken, setEigenTaken] = useState({});
  const [eigenSkillNaam, setEigenSkillNaam] = useState({});
  const [eigenSkillNiveau, setEigenSkillNiveau] = useState({});
  const [uitgebreid, setUitgebreid] = useState(false);

  const setEigenTaak = (skill, idx, val) => setEigenTaken(p => ({...p, [skill]: Object.assign([...Array(5).fill('')], p[skill]||[], {[idx]: val})}));
  const getEigenTaken = (skill) => (eigenTaken[skill]||[]).filter(t=>t&&t.trim());
  const getEigenSkillNaam = (term) => eigenSkillNaam[term]||'';
  const getEigenSkillNiveau = (term) => eigenSkillNiveau[term]||'Gevorderd';

  const heeftEigen = eigenTaal.trim().length > 0;
  const geselecteerdeTaken = taken.filter(t => t.geselecteerd);
  const getNiveau = (tid, skill, orig) => overrides[tid+'-'+skill] || orig;
  const setNiveau = (tid, skill, n) => setOverrides(p => ({...p,[tid+'-'+skill]:n}));
  const eigenTermenLijst = eigenTaal.trim() ? eigenTaal.split(/[,\n]/).map(t=>t.trim()).filter(Boolean) : [];

  const alleHardskills = skillsData ? (() => {
    const map = new Map();
    (skillsData.taken||[]).flatMap(t=>(t.hardskills||[]).map(s=>({...s,niveau:getNiveau(t.id,s.skill,s.niveau),taakId:t.id}))).forEach(s=>{
      if (!map.has(s.skill)) map.set(s.skill, s);
    });
    return [...map.values()];
  })() : [];

  const alleSoftskills = skillsData ? (() => {
    const map = new Map();
    (skillsData.taken||[]).flatMap(t=>(t.softskills||[]).map(s=>({...s,niveau:getNiveau(t.id,'c-'+s.softskill,s.niveau||"Gevorderd")}))).forEach(s=>{
      if (!map.has(s.softskill)) map.set(s.softskill, s);
    });
    eigenTermenLijst.forEach(term => {
      if (!map.has(term)) map.set(term,{softskill:term,niveau:"Gevorderd",bron:"bedrijf",eigen:true,cnl_matched:false});
    });
    return [...map.values()];
  })() : [];

  const selHard = alleHardskills.filter(s=>selectedDef['v-'+s.skill]);
  const selSoft = alleSoftskills.filter(s=>selectedDef['c-'+s.softskill]);

  const leesUitPdf = (file) => {
    if (!file || !file.type.includes('pdf')) return;
    setPdfNaam(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      const arr = new Uint8Array(e.target.result);
      let raw = '';
      for (let i = 0; i < arr.length; i++) raw += String.fromCharCode(arr[i]);
      const matches = raw.match(/[A-Za-z\xC0-\xFF\s\d.,;:!?()%-]{30,}/g) || [];
      const tekst = matches.join(' ').replace(/\s+/g, ' ').trim().slice(0, 8000);
      setPdfTekst(tekst);
    };
    reader.readAsArrayBuffer(file);
  };

  const analyseerTaken = async () => {
    if (!input.trim()) return;
    setLoading(true); setLoadingMsg("Functieprofiel analyseren en taken genereren..."); setError(null);
    try {
      const res = await fetch('/api/analyse-competentnl', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stap:1, functieprofiel:input, bedrijf, eigenTaal, bronnen: bronnen.trim() ? bronnen.split('\n').map(b=>b.trim()).filter(Boolean) : [], pdfTekst: pdfTekst||'' })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setFunctietitel(data.functietitel || "");
      setSamenvatting(data.samenvatting || "");
      setVergelijkbareTitels(data.vergelijkbare_titels || []);
      setTaken(data.taken || []);
      setStap(1);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const koppelSkills = async () => {
    if (!geselecteerdeTaken.length) return;
    setLoading(true); setLoadingMsg("CompetentNL hardskills koppelen aan taken..."); setError(null);
    try {
      const res = await fetch('/api/analyse-competentnl', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ stap:2, functietitel, taken:geselecteerdeTaken, functieprofiel:input, bedrijf, eigenTaal, bronnen })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setSkillsData(data);
      setOverrides({});
      setOpenTask(null);
      setStap(2);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const toggleTaak = (id) => setTaken(prev => prev.map(t => t.id===id ? {...t,geselecteerd:!t.geselecteerd} : t));

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const datum = new Date().toLocaleDateString('nl-NL');
    const datumLang = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
    const rows = [
      ['Bedrijf: '+(bedrijf||'-'),'','','','','','','',''],
      ['Functie: '+functietitel,'','','','','','','',''],
      ['Datum: '+datumLang,'','','','','','','',''],
      ['','','','','','','','',''],
      ['Type','Skill (NL)','Niveau','Gekoppelde taken','CNL Definitie','CompetentNL URI','Bron','Frequentie','Belang']
    ];
    const skillsPerTaak = new Map();
    if (skillsData) (skillsData.taken||[]).forEach(t => skillsPerTaak.set(t.id,t));
    const selHardNames = new Set(selHard.map(s=>s.skill));
    const selSoftNames = new Set(selSoft.map(s=>s.softskill));
    const skillTaakMap = new Map();
    geselecteerdeTaken.forEach(taak => {
      const st = skillsPerTaak.get(taak.id);
      const hs = st ? (st.hardskills||[]).filter(s=>selHardNames.has(s.skill)) : [];
      const ss = st ? (st.softskills||[]).filter(s=>selSoftNames.has(s.softskill)) : [];
      hs.forEach(s => {
        const key = 'h-'+s.skill;
        if (!skillTaakMap.has(key)) skillTaakMap.set(key, { ...s, type:'Hard', naam:s.cnl_label||s.skill, taken:[], bron:taak.bron||'', freq:taak.frequentie||'', belang:taak.belang||'', cnl_definitie:s.cnl_definitie||'' });
        skillTaakMap.get(key).taken.push(taak.taak);
        skillTaakMap.get(key).niveau = getNiveau(taak.id, s.skill, s.niveau);
      });
      ss.forEach(s => {
        const key = 's-'+s.softskill;
        if (!skillTaakMap.has(key)) skillTaakMap.set(key, { ...s, type:'Soft', naam:s.cnl_label||s.softskill, taken:[], bron:taak.bron||'', freq:taak.frequentie||'', belang:taak.belang||'', cnl_definitie:s.cnl_definitie||'' });
        skillTaakMap.get(key).taken.push(taak.taak);
        skillTaakMap.get(key).niveau = getNiveau(taak.id, 'c-'+s.softskill, s.niveau||'Gevorderd');
      });
    });
    skillTaakMap.forEach(s => {
      rows.push([s.type, s.naam, s.niveau, s.taken.join(' | '), s.cnl_definitie||'', s.cnl_uri||'', s.bron||'', s.freq||'', s.belang||'']);
    });
    selHard.filter(s=>s.eigen).forEach(s => {
      rows.push(['Hard', getEigenSkillNaam(s.skill)||s.skill, getEigenSkillNiveau(s.skill), getEigenTaken(s.skill).join(' | '), '', '', 'bedrijf', '', '']);
    });
    selSoft.filter(s=>s.eigen).forEach(s => {
      const term = s.softskill||s.skill;
      rows.push(['Soft', getEigenSkillNaam(term)||term, getEigenSkillNiveau(term), getEigenTaken(term).join(' | '), '', '', 'bedrijf', '', '']);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:35},{wch:12},{wch:80},{wch:55},{wch:60},{wch:10},{wch:12},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, 'Functieprofiel Skillset');
    const meta = [
      ['METHODIEK — Taakanalyse CompetentNL Skills',''],['Bright Work Solutions',''],['',''],
      ['Analyse aangemaakt op: '+datumLang,''],
      ['Functietitel: '+functietitel,''],
      ['Bedrijf: '+(bedrijf||'-'),''],['',''],
      ['ONDERDEEL','TOELICHTING'],
      ['Taken — hoe bepaald?','Claude analyseert het functieprofiel en combineert drie bronnen: (1) taken expliciet vermeld in het ingevoerde profiel, (2) standaardtaken die bij het beroep horen op basis van trainingsdata, (3) taken passend bij de bedrijfscontext indien opgegeven.'],
      ['Skills — databron','Alle skills komen uit de CompetentNL-database, de Nederlandse nationale standaard voor het beschrijven van skills. Zie: https://competentnl.nl'],
      ['Niveaus','Basis = uitvoerend, onder begeleiding; Gevorderd = zelfstandig; Expert = strategisch, begeleidt anderen.'],
      ['',''],['BRONVERMELDING',''],
      ['CompetentNL','https://competentnl.nl'],
      ['ESCO (Europese Commissie)','https://esco.ec.europa.eu'],
      ['Anthropic Claude (AI-model)','https://www.anthropic.com'],
      ['Bronnen geraadpleegd op: '+datumLang,''],
    ];
    const wsMeta = XLSX.utils.aoa_to_sheet(meta);
    wsMeta['!cols'] = [{wch:35},{wch:90}];
    XLSX.utils.book_append_sheet(wb, wsMeta, 'Methodiek');
    XLSX.writeFile(wb, 'Skillset_CompetentNL_'+(bedrijf?bedrijf.replace(/\s/g,'_')+'_':'')+functietitel.replace(/\s/g,'_')+'_'+datum.replace(/\//g,'-')+'.xlsx');
  };

  const D = NIVEAU;

  return (
    <div>
      <div className="header">
        <img src="/logo.png" alt="Bright Work Solutions" className="header-logo"/>
        <div className="header-titles">
          <div className="eyebrow">CompetentNL-aligned · Nederlandse Skills Standaard</div>
          <div className="site-title"><span>Taakanalyse</span> <em>CompetentNL Skills</em><span className="cnl-badge">🇳🇱 NL Standaard</span></div>
        </div>
        <div>
          <input className="field" value={bedrijf} onChange={e=>setBedrijf(e.target.value)} placeholder="Bedrijfsnaam" style={{width:180,fontSize:11}}/>
        </div>
      </div>

      <div className="main">
        <aside className="sidebar">
          <div>
            <button className={"toggle-btn "+(eigenOpen?"open":"")} onClick={()=>setEigenOpen(o=>!o)}>
              <span>Bedrijfsskills</span>
              <span>{eigenOpen?"▲":"▼"}{heeftEigen&&<span className="eigen-sm" style={{marginLeft:6}}>Actief</span>}</span>
            </button>
            {eigenOpen&&<div className="eigen-panel">
              <div>
                <label className="slabel" style={{color:"#6b21a8"}}>Bedrijfseigen termen & kernwaarden</label>
                <textarea rows={5} value={eigenTaal} onChange={e=>setEigenTaal(e.target.value)} placeholder={"bijv. Veiligheid eerst,\nKlantpartnerschap,\nZero defects"} style={{minHeight:"auto",fontSize:11}}/>
              </div>
            </div>}
          </div>

          <div>
            <button className={"toggle-btn "+(bronnenOpen?"open":"")} onClick={()=>setBronnenOpen(o=>!o)} style={bronnenOpen?{borderColor:"#0ea5e9",color:"#0369a1",background:"#f0f9ff",borderRadius:"2px 2px 0 0"}:{}}>
              <span>Aanvullende bronnen</span>
              <span>{bronnenOpen?"▲":"▼"}{bronnen.trim()&&<span style={{background:"#e0f2fe",color:"#0369a1",border:"1px solid #7dd3fc",padding:"1px 5px",borderRadius:2,fontSize:9,marginLeft:6}}>Actief</span>}</span>
            </button>
            {bronnenOpen&&<div style={{border:"1px solid #0ea5e9",borderTop:"none",padding:10,background:"#f0f9ff",display:"flex",flexDirection:"column",gap:8,borderRadius:"0 0 2px 2px"}}>
              <div>
                <label className="slabel" style={{color:"#0369a1"}}>URLs van bronnen — één per regel</label>
                <textarea rows={5} value={bronnen} onChange={e=>setBronnen(e.target.value)} placeholder={"https://www.bedrijf.nl/over-ons\nhttps://www.bedrijf.nl/jaarverslag.pdf"} style={{minHeight:"auto",fontSize:11}}/>
              </div>
              <div>
                <label className="slabel" style={{color:"#0369a1"}}>Of upload een PDF</label>
                <label style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",border:"1px dashed #7dd3fc",borderRadius:2,cursor:"pointer",background:"white",fontSize:10,color:"#0369a1"}}>
                  <span>📄</span>
                  <span>{pdfNaam || "Klik om een PDF te selecteren"}</span>
                  <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>leesUitPdf(e.target.files[0])}/>
                </label>
                {pdfTekst&&<div style={{fontSize:9,color:"#2d6a4f",marginTop:4,padding:"4px 8px",background:"#f0faf2",borderRadius:2}}>✓ PDF gelezen — {pdfTekst.length} tekens</div>}
              </div>
            </div>}
          </div>

          <div>
            <label className="slabel">Functieprofiel invoer</label>
            <textarea rows={9} value={input} onChange={e=>setInput(e.target.value)} placeholder={"Plak hier een functieprofiel,\nvacaturetekst of\ntaakomschrijving..."}/>
          </div>

          {stap===0&&<button className="btn-main" onClick={analyseerTaken} disabled={loading||!input.trim()}>
            {loading?<><span className="spin"/>Analyseren...</>:"Stap 1: Genereer taken →"}
          </button>}

          {stap>=1&&<>
            <button className="btn-main" onClick={analyseerTaken} disabled={loading}>
              {loading&&loadingMsg.includes("taken")?<><span className="spin"/>Laden...</>:"↺ Heranalyseer taken"}
            </button>
            <button className="btn-main" onClick={koppelSkills} disabled={loading||!geselecteerdeTaken.length}>
              {loading&&loadingMsg.includes("CompetentNL")?<><span className="spin"/>CompetentNL koppelen...</>:"Stap 2: Koppel skills ("+geselecteerdeTaken.length+") →"}
            </button>
            {stap>=2&&<button className="btn-main" onClick={()=>setStap(3)} style={{background:"#1b4332"}}>
              Stap 3: Definitieve skillset →
            </button>}
            <button className="btn-ghost" onClick={()=>{setStap(0);setTaken([]);setSkillsData(null);setOverrides({});setSelectedDef({});setEigenTaken({});setEigenSkillNaam({});setEigenSkillNiveau({});setPdfTekst('');setPdfNaam('');}}>
              ↺ Opnieuw beginnen
            </button>
          </>}

          {error&&<div className="err">⚠ {error}</div>}

          <div className="legend">
            <label className="slabel">Bronlegenda</label>
            <div className="li"><span>📄</span><div><div style={{fontWeight:500}}>Profiel</div><div style={{fontSize:9,color:"var(--muted)"}}>Uit vacature/functieprofiel</div></div></div>
            <div className="li"><span>🔧</span><div><div style={{fontWeight:500}}>Beroep</div><div style={{fontSize:9,color:"var(--muted)"}}>Uit beroeps-/sectorkennis</div></div></div>
            <div className="li"><span>🏢</span><div><div style={{fontWeight:500}}>Bedrijf</div><div style={{fontSize:9,color:"var(--muted)"}}>Jouw bedrijfsskills</div></div></div>
            <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:6}}>
              <label className="slabel">Niveaulegenda</label>
              {Object.entries(D).map(([l,d])=><div key={l} className="li">
                <div className="ld" style={{background:d.d}}/>
                <div><div style={{color:d.t,fontWeight:500}}>{l}</div><div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{d.desc}</div></div>
              </div>)}
            </div>
            <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:6,fontSize:9,color:"var(--muted)",lineHeight:1.6}}>
              Skills: <strong>CompetentNL</strong><br/>Nationale standaard NL<br/>Gratis, publiek, overheid
            </div>
          </div>
        </aside>

        <main className="content">
          {loading&&<div className="ls">
            <div className="ls-t">{loadingMsg||"Laden..."}</div>
            <div className="lb"/>
            <div style={{fontSize:9,color:"var(--muted)",letterSpacing:"0.12em",textTransform:"uppercase"}}>Even geduld</div>
          </div>}

          {!loading&&stap===0&&<div className="empty">
            <div className="empty-g">🇳🇱</div>
            <div className="empty-t">Plak een functieprofiel om te beginnen</div>
            <div style={{fontSize:10,color:"var(--muted)",textAlign:"center",maxWidth:320,lineHeight:1.6,marginTop:8}}>
              Stap 1 → Taken genereren & valideren<br/>
              Stap 2 → Skills koppelen<br/>
              Stap 3 → Definitieve skillset exporteren<br/>
              <span style={{fontSize:9,marginTop:6,display:"block",color:"var(--accent)"}}>Gebaseerd op de Nederlandse nationale skillsstandaard</span>
            </div>
          </div>}

          {!loading&&stap>=1&&stap!==2&&stap!==3&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel}</div>
              <div className="rs">{samenvatting}</div>
              <div className="rm">
                <span><strong>{taken.length}</strong> taken totaal</span>
                <span><strong>{geselecteerdeTaken.length}</strong> geselecteerd</span>
              </div>
              {vergelijkbareTitels.length>0&&<div className="rv">Ook bekend als: {vergelijkbareTitels.join(" · ")}</div>}
            </div>
            <div style={{padding:"10px 22px",background:"var(--surface)",borderBottom:"1px solid var(--border)",fontSize:10,color:"var(--muted)"}}>
              Vink de taken aan die van toepassing zijn. Klik daarna op <strong>Stap 2</strong> om CompetentNL skills te koppelen.
            </div>
            <div className="tc"><div className="fi">
              {taken.map(t=><div key={t.id} className={"taak-row "+(t.geselecteerd?"selected":"")} onClick={()=>toggleTaak(t.id)}>
                <div className="taak-check">{t.geselecteerd&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                <div className="taak-body">
                  <div className="taak-naam">{t.taak}</div>
                  <div className="taak-meta">
                    {t.bron&&<span className="tbadge" style={{background:t.bron==="profiel"?"#e8f5e9":t.bron==="beroep"?"#fef3d0":"#f3e8ff",color:t.bron==="profiel"?"#1b4332":t.bron==="beroep"?"#7a5c00":"#6b21a8",borderColor:t.bron==="profiel"?"#a5d6a7":t.bron==="beroep"?"#e8c96a":"#c084fc"}}>{t.bron==="profiel"?"📄 profiel":t.bron==="beroep"?"🔧 beroep":"🏢 bedrijf"}</span>}
                    {t.frequentie&&<span className="tbadge" style={{background:"var(--bg)",color:"var(--muted)",borderColor:"var(--border)"}}>{t.frequentie}</span>}
                    {t.belang&&<span className="tbadge" style={{background:t.belang==="hoog"?"#fce4e4":t.belang==="middel"?"#fef3d0":"#d8f3dc",color:t.belang==="hoog"?"#9b2226":t.belang==="middel"?"#7a5c00":"#2d6a4f",borderColor:t.belang==="hoog"?"#e07070":t.belang==="middel"?"#e8c96a":"#74c69d"}}>belang: {t.belang}</span>}
                  </div>
                </div>
              </div>)}
            </div></div>
          </div>}

          {!loading&&stap===2&&skillsData&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel}</div>
              <div className="rm">
                <span><strong>{geselecteerdeTaken.length}</strong> taken</span>
                <span><strong>{alleHardskills.length}</strong> hardskills</span>
                <span><strong>{alleSoftskills.length}</strong> softskills</span>
              </div>
            </div>
            <div className="steps">
              <button className="step-btn done" onClick={()=>setStap(1)}>◀ Taken aanpassen</button>
              <button className="step-btn active">Stap 2: Skills & niveaus</button>
              <button className="step-btn" onClick={()=>setStap(3)}>Stap 3: Definitieve set ▶</button>
            </div>
            <div className="tc">
              {(skillsData.taken||[]).map((t,i)=>{
                const taakInfo = geselecteerdeTaken.find(gt=>gt.id===t.id);
                const open = openTask===i;
                return <div key={t.id||i} className={"tk "+(open?"open":"")}>
                  <div className="tkh" onClick={()=>setOpenTask(open?null:i)}>
                    <div className="tnum">{String(i+1).padStart(2,"0")}</div>
                    <div className="tbody">
                      <div className="tname">{taakInfo?.taak||"Taak "+t.id}</div>
                      {!open&&<div className="pills">
                        {(t.hardskills||[]).slice(0,3).map(s=>{
                          const n=getNiveau(t.id,s.skill,s.niveau); const d=D[n];
                          return <span key={s.skill} className="pill" style={{background:d.k,color:d.t,borderColor:d.b}}>
                            <span className="pd" style={{background:d.d}}/>{s.cnl_label||s.skill}
                          </span>;
                        })}
                      </div>}
                    </div>
                    <div className="tchev">{open?"▲":"▼"}</div>
                  </div>
                  {open&&<div className="tex">
                    <div>
                      <div className="secl">Hardskills</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {(t.hardskills||[]).map(s=>{
                          const cur=getNiveau(t.id,s.skill,s.niveau); const d=D[cur]; const val=NIVEAUS.indexOf(cur);
                          return <div key={s.skill} className="sk-card">
                            <div className="sk-top">
                              <span className="pd" style={{background:d.d,width:6,height:6}}/>
                              <div className="sk-name">
                                {s.cnl_label||s.skill}
                                {s.cnl_matched&&s.cnl_code&&<span className="cnl-skill-badge">{s.cnl_code}</span>}
                                {!s.cnl_matched&&<span className="no-match">geen match</span>}
                                {s.cnl_definitie&&<div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{s.cnl_definitie.slice(0,120)}</div>}
                              </div>
                              <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b}}>{cur}</span>
                            </div>
                            <div className="sl-wrap">
                              <input type="range" min={0} max={2} step={1} value={val} onChange={e=>setNiveau(t.id,s.skill,NIVEAUS[parseInt(e.target.value)])}/>
                              <div className="sl-labels"><span>Basis</span><span>Gevorderd</span><span>Expert</span></div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                    <div>
                      <div className="secl">Softskills</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {(t.softskills||[]).filter((s,i,a)=>a.findIndex(x=>x.softskill===s.softskill)===i).map(s=>{
                          const cur=getNiveau(t.id,'c-'+s.softskill,s.niveau||"Gevorderd"); const d=D[cur]; const val=NIVEAUS.indexOf(cur);
                          return <div key={s.softskill} className="sk-card" style={{borderColor:s.eigen?"#c084fc":"var(--border)"}}>
                            <div className="sk-top">
                              <span className="pd" style={{background:s.eigen?"#c084fc":d.d,width:6,height:6}}/>
                              <div className="sk-name">
                                {s.cnl_label||s.softskill}
                                {s.eigen&&<span className="eigen-badge">Eigen</span>}
                                {!s.eigen&&s.cnl_matched&&s.cnl_code&&<span className="cnl-skill-badge">{s.cnl_code}</span>}
                                {!s.eigen&&!s.cnl_matched&&<span className="no-match">geen match</span>}
                                {s.cnl_definitie&&<div style={{fontSize:9,color:"var(--muted)",marginTop:1}}>{s.cnl_definitie.slice(0,120)}</div>}
                              </div>
                              <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b}}>{cur}</span>
                            </div>
                            <div className="sl-wrap">
                              <input type="range" min={0} max={2} step={1} value={val} onChange={e=>setNiveau(t.id,'c-'+s.softskill,NIVEAUS[parseInt(e.target.value)])}/>
                              <div className="sl-labels"><span>Basis</span><span>Gevorderd</span><span>Expert</span></div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                  </div>}
                </div>;
              })}

              {eigenTermenLijst.length>0&&<div style={{marginTop:16,border:"1px solid #c084fc",borderRadius:2,overflow:"hidden"}}>
                <div style={{background:"#f3e8ff",padding:"8px 12px",fontSize:8,letterSpacing:".15em",textTransform:"uppercase",color:"#6b21a8",borderBottom:"1px solid #c084fc"}}>
                  Bedrijfseigen skills — koppel CompetentNL skill + taken
                </div>
                <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
                  {eigenTermenLijst.map(term=>{
                    const niv = getEigenSkillNiveau(term);
                    const d = D[niv];
                    const val = NIVEAUS.indexOf(niv);
                    return <div key={term} style={{border:"1px solid #c084fc",borderRadius:2,padding:"10px 12px",background:"#fdf9ff"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                        <span style={{width:6,height:6,borderRadius:"50%",background:"#c084fc",flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <span style={{fontSize:11,fontWeight:500}}>{term}</span>
                          <span className="eigen-badge" style={{marginLeft:4}}>Bedrijfsterm</span>
                        </div>
                      </div>
                      <div style={{fontSize:8,letterSpacing:".12em",textTransform:"uppercase",color:"#6b21a8",marginBottom:3}}>CompetentNL skill naam</div>
                      <input className="field" value={getEigenSkillNaam(term)} onChange={e=>setEigenSkillNaam(p=>({...p,[term]:e.target.value}))} placeholder="bijv. contactdozen bedraden..." style={{marginBottom:8,fontSize:10,background:"white",borderColor:"#c084fc"}}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{fontSize:8,letterSpacing:".12em",textTransform:"uppercase",color:"#6b21a8"}}>Niveau</div>
                        <span className="sk-badge" style={{background:d.k,color:d.t,borderColor:d.b,fontSize:9}}>{niv}</span>
                      </div>
                      <div className="sl-wrap" style={{marginBottom:8}}>
                        <input type="range" min={0} max={2} step={1} value={val} onChange={e=>setEigenSkillNiveau(p=>({...p,[term]:NIVEAUS[parseInt(e.target.value)]}))}/>
                        <div className="sl-labels"><span>Basis</span><span>Gevorderd</span><span>Expert</span></div>
                      </div>
                      <div style={{fontSize:8,letterSpacing:".12em",textTransform:"uppercase",color:"#6b21a8",marginBottom:4}}>Gekoppelde taken (max 5)</div>
                      {[0,1,2,3,4].map(idx=><input key={idx} className="field" value={(eigenTaken[term]||[])[idx]||''} onChange={e=>setEigenTaak(term,idx,e.target.value)} placeholder={"Taak "+(idx+1)+"..."} style={{marginBottom:3,fontSize:10,background:"white",borderColor:"#c084fc"}}/>)}
                    </div>;
                  })}
                </div>
              </div>}
            </div>
          </div>}

          {!loading&&stap===3&&<div className="fi" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="rh">
              <div className="rt">{functietitel} — Definitieve Skillset</div>
              <div className="rm">
                <span><strong>{selHard.length}</strong> hardskills</span>
                <span><strong>{selSoft.length}</strong> softskills</span>
                <span><strong>{selHard.length+selSoft.length}</strong> totaal</span>
              </div>
            </div>
            <div className="steps">
              <button className="step-btn done" onClick={()=>setStap(1)}>◀ Taken</button>
              <button className="step-btn done" onClick={()=>setStap(2)}>◀ Skills aanpassen</button>
              <button className="step-btn active">Stap 3: Definitieve set</button>
            </div>
            <div className="tc">
              <div className="counter-box">
                <div className="counter">Hardskills: <strong>{selHard.length}</strong></div>
                <div className="counter">Softskills: <strong>{selSoft.length}</strong></div>
                <div className="counter" style={{fontWeight:600}}>Totaal: <strong>{selHard.length+selSoft.length}</strong></div>
                {(selHard.length+selSoft.length)>0&&<div className="export-btns">
                  <button onClick={exportExcel} className="btn-export btn-excel">↓ Excel</button>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {wordLoading
                      ? <span style={{fontSize:10,color:"var(--accent)",padding:"5px 10px",border:"1px solid var(--border)",borderRadius:2}}>Word genereren...</span>
                      : <button onClick={async()=>{
                          setWordLoading(true);
                          try{
                            const blob=await generateWordDoc({functietitel,bedrijf,samenvatting,vergelijkbareTitels,geselecteerdeTaken,skillsData,selHard,selSoft,overrides,eigenTermenLijst,uitgebreid,bronnen,pdfNaam,input});
                            const datum=new Date().toLocaleDateString('nl-NL').replace(/\//g,'-');
                            const naam='Taakanalyse_CNL_'+(bedrijf?bedrijf.replace(/\s/g,'_')+'_':'')+functietitel.replace(/\s/g,'_')+'_'+datum+'.docx';
                            const url=URL.createObjectURL(blob);
                            const a=document.createElement('a');a.href=url;a.download=naam;a.click();URL.revokeObjectURL(url);
                          }catch(e){alert('Word fout: '+e.message);}
                          finally{setWordLoading(false);}
                        }} className="btn-export btn-word">↓ Word</button>
                    }
                    <label style={{display:"flex",alignItems:"center",gap:5,fontSize:9,color:"var(--accent2)",cursor:"pointer"}}>
                      <input type="checkbox" checked={uitgebreid} onChange={e=>setUitgebreid(e.target.checked)} style={{cursor:"pointer"}}/>
                      Uitgebreide functieomschrijving
                    </label>
                  </div>
                </div>}
              </div>
              <div style={{marginBottom:16}}>
                <div className="secl" style={{marginBottom:8}}>Hardskills — selecteer gewenste skills</div>
                {alleHardskills.map(s=>{
                  const k='v-'+s.skill; const sel=!!selectedDef[k]; const d=D[s.niveau];
                  return <div key={k} className={"def-row "+(sel?"selected":"")} onClick={()=>setSelectedDef(p=>({...p,[k]:!p[k]}))}>
                    <div className="def-check">{sel&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                    <span className="pd" style={{background:d.d}}/>
                    <div style={{flex:1,fontSize:11}}>
                      {s.cnl_label||s.skill}
                      {s.cnl_code&&<span className="cnl-skill-badge">{s.cnl_code}</span>}
                    </div>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,border:"1px solid",background:d.k,color:d.t,borderColor:d.b,flexShrink:0}}>{s.niveau}</span>
                  </div>;
                })}
              </div>
              <div>
                <div className="secl" style={{marginBottom:8}}>Softskills — selecteer gewenste skills</div>
                {alleSoftskills.map(s=>{
                  const k='c-'+s.softskill; const sel=!!selectedDef[k]; const d=D[s.niveau||"Gevorderd"];
                  return <div key={k} className={"def-row "+(sel?"selected":"")} onClick={()=>setSelectedDef(p=>({...p,[k]:!p[k]}))}>
                    <div className="def-check">{sel&&<span style={{color:"white",fontSize:10}}>✓</span>}</div>
                    <span className="pd" style={{background:s.eigen?"#c084fc":d.d}}/>
                    <div style={{flex:1,fontSize:11}}>
                      {s.cnl_label||s.softskill}
                      {s.eigen&&<span className="eigen-badge">Eigen</span>}
                      {!s.eigen&&s.cnl_code&&<span className="cnl-skill-badge">{s.cnl_code}</span>}
                    </div>
                    <span style={{fontSize:9,padding:"2px 7px",borderRadius:2,border:"1px solid",background:d.k,color:d.t,borderColor:d.b,flexShrink:0}}>{s.niveau||"Gevorderd"}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
